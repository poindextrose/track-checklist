name = "tcl-auth"
main = "worker.js"
compatibility_date = "2024-11-01"

# KV namespace that stores each session's refresh token.
# Create it with:  wrangler kv namespace create TOKENS
# then paste the returned id below.
[[kv_namespaces]]
binding = "TOKENS"
id = "e1b751aeefd144bc97379b1eaf30e2fc"

# Secrets are NOT stored here — set them with `wrangler secret put`:
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put ALLOWED_ORIGIN      # e.g. https://poindextrose.github.io
